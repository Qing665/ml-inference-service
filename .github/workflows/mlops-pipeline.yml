name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: python train_model.py

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=app --cov-report=xml --cov-report=term --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker mirror
        run: |
          echo '{"registry-mirrors": ["https://docker.1ms.run"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ml-inference:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_REGISTRY=crpi-8vw2fragz599b40r.cn-hangzhou.personal.cr.aliyuncs.com/hhq-docker/

      - name: Test Docker image
        run: |
          docker run -d -p 8000:8000 --name test-container ml-inference:${{ github.sha }}
          sleep 5
          curl --retry 5 --retry-delay 2 http://localhost:8000/health
          docker stop test-container

      - name: Save image as artifact
        run: |
          docker save ml-inference:${{ github.sha }} -o ml-inference.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ml-inference.tar.gz

  deploy-simulate:
    needs: build-docker
    runs-on: ubuntu-latest
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Simulate deployment
        run: |
          echo "===== 模拟生产环境部署 ====="
          echo "部署版本: ${{ github.sha }}"
          echo "部署时间: $(date)"
          echo "镜像大小: $(ls -lh ml-inference.tar.gz | awk '{print $5}')"
          echo ""
          echo "部署完成 - 服务已上线"
          echo "迭代周期: 从代码提交到部署完成约 2 分钟"
          echo "相比传统手动流程（2天），效率提升显著"