name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # 允许手动触发

jobs:
  # 阶段一：代码质量检查
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run pre-commit hooks
      uses: pre-commit/action@v3.0.0

    - name: Train model (if not exists)
      run: python train_model.py

    - name: Run tests with coverage
      run: |
        pytest tests/ --cov=app --cov-report=xml --cov-report=term --junitxml=test-results.xml

    - name: Upload coverage to Codecov (可选)
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

    - name: Upload test results
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: test-results.xml

  # 阶段二：构建 Docker 镜像
  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        load: true
        tags: ml-inference:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        docker run -d -p 8000:8000 --name test-container ml-inference:${{ github.sha }}
        sleep 5
        curl --retry 5 --retry-delay 2 http://localhost:8000/health
        docker stop test-container

    - name: Save image as artifact (模拟打包)
      run: |
        docker save ml-inference:${{ github.sha }} -o ml-inference.tar.gz

    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v3
      with:
        name: docker-image
        path: ml-inference.tar.gz

  # 阶段三：模拟部署
  deploy-simulate:
    needs: build-docker
    runs-on: ubuntu-latest
    steps:
    - name: Download Docker image
      uses: actions/download-artifact@v3
      with:
        name: docker-image

    - name: Simulate deployment
      run: |
        echo "===== 模拟生产环境部署 ====="
        echo "部署版本: ${{ github.sha }}"
        echo "部署时间: $(date)"
        echo "镜像大小: $(ls -lh ml-inference.tar.gz | awk '{print $5}')"
        echo ""
        echo "部署完成 - 服务已上线"
        echo "迭代周期: 从代码提交到部署完成约 2 分钟"
        echo "相比传统手动流程（2天），效率提升显著"
